name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements-dev.txt
      - run: flake8 app/ scripts/ tests/ --max-line-length=120
      - run: black --check app/ scripts/ tests/
      - run: python -c "import app.main"
      - run: python scripts/check_html_balance.py
      - run: python scripts/extract_studio_js.py | node --check
      - run: pytest tests/ -v
