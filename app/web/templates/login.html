<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 爆款猎人</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: #fff; border-radius: 16px; padding: 40px 36px;
            width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,.3);
        }
        .login-box .logo {
            text-align: center; margin-bottom: 28px;
        }
        .login-box .logo .icon {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 22px; color: #fff; margin-bottom: 10px;
        }
        .login-box .logo h1 { font-size: 18px; font-weight: 700; color: #111827; }
        .login-box .logo p { font-size: 11px; color: #9ca3af; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 5px; }
        .form-group input {
            width: 100%; padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 8px;
            font-size: 13px; outline: none; transition: border-color .15s;
        }
        .form-group input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,.1); }
        .btn-login {
            width: 100%; padding: 11px; border: none; border-radius: 8px;
            background: #8b5cf6; color: #fff; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background .15s; margin-top: 8px;
        }
        .btn-login:hover { background: #7c3aed; }
        .btn-login:disabled { opacity: .5; cursor: not-allowed; }
        .error-msg {
            color: #b91c1c; font-size: 11px; margin-top: 8px; text-align: center;
            display: none;
        }
        .error-msg.show { display: block; }
        .hint {
            text-align: center; font-size: 10px; color: #9ca3af; margin-top: 16px;
        }
        .hint strong { color: #6b7280; }
        .hint .tag-admin { display: inline-block; background:#e0e7ff; color:#4338ca; padding:1px 6px; border-radius:4px; font-size:9px; margin:0 2px; }
        .hint .tag-user { display: inline-block; background:#d1fae5; color:#065f46; padding:1px 6px; border-radius:4px; font-size:9px; margin:0 2px; }
        .role-badge {
            text-align: center; margin-top: 12px; display: none;
        }
        .role-badge.show { display: block; }
        .role-badge .badge {
            display: inline-block; padding: 3px 12px; border-radius: 999px;
            font-size: 11px; font-weight: 600;
        }
        .role-badge .badge.admin { background: #e0e7ff; color: #4338ca; }
        .role-badge .badge.user { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <div class="icon">🔍</div>
        <h1>爆款猎人</h1>
        <p>漫剧 AI 分析平台</p>
    </div>
    <form onsubmit="doLogin(event)">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="error-msg" id="error-msg"></div>
        <button type="submit" class="btn-login" id="btn-login">登 录</button>
    </form>
    <div class="role-badge" id="role-badge">
        <span class="badge" id="role-badge-text"></span>
    </div>
    <div class="hint">
        <strong>Demo 账号:</strong><br>
        <span class="tag-admin">admin</span> → admin / ****** <span class="tag-admin">管理员(全部权限)</span><br>
        <span class="tag-user">user</span> → user / ****** <span class="tag-user">试用用户(仅创作中心)</span>
    </div>
</div>

<script>
async function doLogin(e) {
    e.preventDefault();
    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value;
    var btn = document.getElementById('btn-login');
    var err = document.getElementById('error-msg');

    if (!user || !pass) {
        err.textContent = '请输入用户名和密码';
        err.classList.add('show');
        return;
    }

    btn.disabled = true;
    btn.textContent = '登录中...';
    err.classList.remove('show');

    try {
        var resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        var data = await resp.json();
        if (resp.ok && data.ok) {
            window.location.href = '/workspace';
        } else {
            err.textContent = data.detail || '登录失败，请重试';
            err.classList.add('show');
        }
    } catch (e) {
        err.textContent = '网络错误，请检查连接';
        err.classList.add('show');
    }
    btn.disabled = false;
    btn.textContent = '登 录';
}

// 回车提交
document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin(e);
});
</script>
</body>
</html>
